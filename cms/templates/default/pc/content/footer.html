<script>
function dr_search(name) {
    var url = "{WEB_PATH}api.php?op=search&siteid={$siteid}&{php if (isset($params['keyword'])) unset($params['keyword']); echo $params ? http_build_query($params): '';}";
    var value = $("#" + name).val();
    if (value) {
        location.href = url+"&keyword="+value;
    } else {
        $("#" + name).focus();
        dr_tips(0, "输入关键字");
    }
    return false;
}
